<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide mount outer frame -->
  <rect x="1" y="1" width="16" height="16" rx="2" fill="black"/>
  <!-- Film frame opening (transparent cutout) -->
  <rect x="3.5" y="4" width="11" height="10" rx="1" fill="white"/>
  <!-- Sprocket holes left -->
  <rect x="2" y="5.5" width="1" height="1.5" rx="0.3" fill="white"/>
  <rect x="2" y="8.25" width="1" height="1.5" rx="0.3" fill="white"/>
  <rect x="2" y="11" width="1" height="1.5" rx="0.3" fill="white"/>
  <!-- Sprocket holes right -->
  <rect x="15" y="5.5" width="1" height="1.5" rx="0.3" fill="white"/>
  <rect x="15" y="8.25" width="1" height="1.5" rx="0.3" fill="white"/>
  <rect x="15" y="11" width="1" height="1.5" rx="0.3" fill="white"/>
</svg>
